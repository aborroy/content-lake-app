server:
  port: 9091

spring:
  application:
    name: rag-service

  ai:
    openai:
      base-url: ${MODEL_RUNNER_URL:http://localhost:12434}
      api-key: ${MODEL_RUNNER_API_KEY:not-needed}
      chat:
        options:
          model: ${LLM_MODEL:ai/gpt-oss}
          temperature: ${LLM_TEMPERATURE:0.3}
          maxTokens: ${LLM_MAX_TOKENS:2048}
      embedding:
        options:
          model: ${EMBEDDING_MODEL:ai/mxbai-embed-large}

# Alfresco SDK configuration
# Service account for internal operations (group resolution, metadata enrichment)
# API endpoints require per-request authentication with user credentials
content:
  service:
    url: ${ALFRESCO_URL:http://localhost:80}
    security:
      basicAuth:
        username: ${ALFRESCO_INTERNAL_USERNAME:admin}
        password: ${ALFRESCO_INTERNAL_PASSWORD:admin}

nuxeo:
  base-url: ${NUXEO_URL:http://localhost:8081/nuxeo}
  username: ${NUXEO_USERNAME:Administrator}
  password: ${NUXEO_PASSWORD:Administrator}
  source-id: ${NUXEO_SOURCE_ID:}

# hxpr Content Lake connection
hxpr:
  url: ${HXPR_URL:http://localhost:8080}
  repository-id: ${HXPR_REPOSITORY_ID:default}
  idp:
    token-url: ${HXPR_IDP_TOKEN_URL:http://localhost:5002/idp/connect/token}
    client-id: ${HXPR_IDP_CLIENT_ID:nuxeo-client}
    client-secret: ${HXPR_IDP_CLIENT_SECRET:secret}
    username: ${HXPR_IDP_USERNAME:testuser}
    password: ${HXPR_IDP_PASSWORD:password}

# RAG configuration
rag:
  default-top-k: ${RAG_DEFAULT_TOP_K:15}
  default-min-score: ${RAG_DEFAULT_MIN_SCORE:0.01}
  max-context-length: ${RAG_MAX_CONTEXT_LENGTH:20000}
  use-hybrid-search: ${RAG_USE_HYBRID_SEARCH:true}
  default-system-prompt: >
    You are a document assistant that answers questions based strictly on the provided context.

    RULES:
    1. Use ONLY information from the DOCUMENT CONTEXT below. Do not use prior knowledge.
    2. Answer completely. Include every fact, number, name, date, code, and identifier from
    the sources that is relevant to the question. Missing a key detail is worse than being
    slightly long.
    3. Start your answer directly with the relevant information. Do not begin with phrases
    like "Based on the provided context", "According to the documents", or similar preambles.
    4. When referencing information, cite the source using its label (e.g. "Source 1 states...").
    Cite each source once per answer, not once per sentence.
    5. If multiple sources contain relevant information, synthesize them and cite each.
    6. For questions asking about lists, steps, specifications, or enumerations, use a numbered
    or bulleted list.
    7. If you can answer part of the question from the context, do so, then note what is
    genuinely missing. Do not refuse the whole question because one detail is unclear.
    8. Be concise -- do not repeat yourself or add unnecessary filler -- but completeness
    takes priority over brevity.
    9. You may apply standard world knowledge for unit conversions (temperatures, currencies,
    UTC offsets) when the document context provides the underlying fact but not the converted
    value. Do not invent document facts.
  reranker:
    url: ${RAG_RERANKER_URL:}
    top-n: ${RAG_RERANKER_TOP_N:8}
  conversation:
    enabled: ${RAG_CONVERSATION_ENABLED:true}
    max-history-turns: ${RAG_CONVERSATION_MAX_HISTORY_TURNS:10}
    session-ttl-minutes: ${RAG_CONVERSATION_SESSION_TTL_MINUTES:30}
    query-reformulation: ${RAG_CONVERSATION_QUERY_REFORMULATION:true}

# Semantic Search configuration
semantic-search:
  default-min-score: ${SEMANTIC_SEARCH_MIN_SCORE:0.2}

# Hybrid Search configuration (vector + keyword fusion)
search:
  hybrid:
    enabled: ${SEARCH_HYBRID_ENABLED:${HYBRID_SEARCH_ENABLED:true}}
    strategy: ${SEARCH_HYBRID_STRATEGY:${HYBRID_SEARCH_STRATEGY:rrf}}
    normalization: ${SEARCH_HYBRID_NORMALIZATION:${HYBRID_SEARCH_NORMALIZATION:max}}
    vector-weight: ${SEARCH_HYBRID_VECTOR_WEIGHT:${HYBRID_SEARCH_VECTOR_WEIGHT:0.7}}
    text-weight: ${SEARCH_HYBRID_TEXT_WEIGHT:${HYBRID_SEARCH_TEXT_WEIGHT:0.3}}
    initial-candidates: ${SEARCH_HYBRID_INITIAL_CANDIDATES:${HYBRID_SEARCH_CANDIDATE_COUNT:75}}
    final-results: ${SEARCH_HYBRID_FINAL_RESULTS:${HYBRID_SEARCH_MAX_RESULTS:20}}
    rrf-k: ${SEARCH_HYBRID_RRF_K:${HYBRID_SEARCH_RRF_K:60}}
    default-min-score: ${SEARCH_HYBRID_MIN_SCORE:${HYBRID_SEARCH_MIN_SCORE:0.01}}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    org.alfresco.contentlake: ${LOG_LEVEL:INFO}
